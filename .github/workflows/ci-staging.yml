name: ci-staging
on:
  push:
    branches: [staging]
  workflow_dispatch: {}
env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/web-masters-ke/wasaa-music-admin
  # Staging build-time public config (baked into the client bundle)
  NEXT_PUBLIC_API_URL: /api-proxy/api/v1/music
  NEXT_PUBLIC_IDENTITY_URL: /api-proxy/api/v1/identity
  NEXT_PUBLIC_UPSTREAM_ORIGIN: https://dr.wasaachat.com
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tag
        run: echo "tag=staging-$(date -u +%Y%m%d%H%M)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest-staging
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_IDENTITY_URL=${{ env.NEXT_PUBLIC_IDENTITY_URL }}
            NEXT_PUBLIC_UPSTREAM_ORIGIN=${{ env.NEXT_PUBLIC_UPSTREAM_ORIGIN }}
      - run: echo "Pushed ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} and :latest-staging"
